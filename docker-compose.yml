services:
  # ===========================================================
  #  REST Gateway — 統一 API 入口
  # ===========================================================
  gateway:
    build: .
    container_name: whatsapp-gateway
    restart: unless-stopped
    ports:
      - "${REST_PORT:-3090}:3090"
    environment:
      # API 認證
      - API_KEY=${API_KEY:-}
      # AI Gateway（連到主機上的 OpenClaw）
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-ws://host.docker.internal:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      # 伺服器
      - REST_PORT=3090
      - REST_HOST=0.0.0.0
      # WhatsApp 實例（容器內網路用 container name）
      - WA_INSTANCE_1=http://whatsapp-1:8085
      - WA_INSTANCE_2=http://whatsapp-2:8085
      - WA_INSTANCE_3=http://whatsapp-3:8085
      - WA_INSTANCE_4=http://whatsapp-4:8085
      # 標籤
      - WA_LABEL_1=${WA_LABEL_1:-一號}
      - WA_LABEL_2=${WA_LABEL_2:-二號}
      - WA_LABEL_3=${WA_LABEL_3:-三號}
      - WA_LABEL_4=${WA_LABEL_4:-四號}
      # Webhook
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      # 速率限制
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-60}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - whatsapp-1
      - whatsapp-2
      - whatsapp-3
      - whatsapp-4

  # ===========================================================
  #  Connector — 連接 Cloudflare Hub 的橋接器
  # ===========================================================
  connector:
    build: .
    container_name: whatsapp-connector
    restart: unless-stopped
    command: node connector.js
    environment:
      - HUB_WS_URL=${HUB_WS_URL:-wss://whatsapp-gateway-hub.ai-caseylai.workers.dev}
      - CONNECTOR_SECRET=${CONNECTOR_SECRET:-}
      - GATEWAY_LOCAL_URL=http://gateway:3090
      - API_KEY=${API_KEY:-}
    depends_on:
      - gateway

  # ===========================================================
  #  4 個 WhatsApp 實例
  # ===========================================================
  whatsapp-1:
    image: blakegt/whatsapp-web-api-rest:latest
    container_name: whatsapp-1
    restart: unless-stopped
    ports:
      - "8085:8085"
    volumes:
      - ./data/whatsapp-1:/app/data

  whatsapp-2:
    image: blakegt/whatsapp-web-api-rest:latest
    container_name: whatsapp-2
    restart: unless-stopped
    ports:
      - "8086:8085"
    volumes:
      - ./data/whatsapp-2:/app/data

  whatsapp-3:
    image: blakegt/whatsapp-web-api-rest:latest
    container_name: whatsapp-3
    restart: unless-stopped
    ports:
      - "8087:8085"
    volumes:
      - ./data/whatsapp-3:/app/data

  whatsapp-4:
    image: blakegt/whatsapp-web-api-rest:latest
    container_name: whatsapp-4
    restart: unless-stopped
    ports:
      - "8088:8085"
    volumes:
      - ./data/whatsapp-4:/app/data
